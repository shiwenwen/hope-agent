<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hope Agent Browser Control</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-width: 280px;
        padding: 12px;
      }
      .header {
        align-items: center;
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      .dot {
        background: #9ca3af;
        border-radius: 999px;
        height: 8px;
        width: 8px;
      }
      .dot.connected {
        background: #22c55e;
      }
      h1 {
        font-size: 13px;
        line-height: 1.2;
        margin: 0;
      }
      .status {
        color: #6b7280;
        font-size: 12px;
        margin: 0 0 12px;
      }
      .actions {
        display: grid;
        gap: 8px;
      }
      button {
        align-items: center;
        appearance: none;
        border: 1px solid #d1d5db;
        border-radius: 7px;
        cursor: pointer;
        display: flex;
        font: 600 12px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        min-height: 32px;
        padding: 0 10px;
      }
      button.primary {
        background: #111827;
        border-color: #111827;
        color: #f9fafb;
      }
      button.secondary {
        background: transparent;
        color: inherit;
      }
      button:disabled {
        cursor: default;
        opacity: 0.55;
      }
      .message {
        color: #6b7280;
        font-size: 11px;
        line-height: 1.35;
        margin: 10px 0 0;
        min-height: 15px;
      }
      @media (prefers-color-scheme: dark) {
        .status,
        .message {
          color: #9ca3af;
        }
        button.secondary {
          border-color: #374151;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span id="dot" class="dot"></span>
      <h1>Hope Agent Browser Control</h1>
    </div>
    <p id="status" class="status">Checking connection...</p>
    <div class="actions">
      <button id="stop-current" class="primary" type="button">Stop current tab</button>
      <button id="stop-all" class="secondary" type="button">Stop all controlled tabs</button>
    </div>
    <p id="message" class="message"></p>
    <script src="popup.js"></script>
  </body>
</html>
