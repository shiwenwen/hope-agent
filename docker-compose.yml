# Hope Agent — official docker-compose example.
#
# Quick start:
#   1. docker compose up -d
#   2. Open http://127.0.0.1:8420 in a browser, run the onboarding wizard
#      (configure Provider API keys, MCP servers, IM channels).
#   3. Done — chat at http://127.0.0.1:8420.
#
# Enable Ollama sidecar for local LLMs:
#   docker compose --profile with-ollama up -d
#
# Expose to the LAN / public internet:
#   The browser onboarding wizard (and the Web GUI in general) cannot
#   currently bootstrap an API key into the page. Setting HA_API_KEY here
#   would block the wizard with 401 on first load. The recommended path
#   is to put a reverse proxy (Caddy / Nginx / Traefik) in front with
#   network-level auth (TLS client certs, basic auth, OIDC), or restrict
#   the listener to a VPN / tailnet. Direct LAN exposure with HA_API_KEY
#   set is tracked as a follow-up (browser token entry UX needs work).
#   See docs/deployment/docker.md.

services:
  hope-agent:
    image: ghcr.io/shiwenwen/hope-agent:latest
    container_name: hope-agent
    restart: unless-stopped
    ports:
      # Default: loopback only. Hope Agent does not enforce auth when
      # HA_API_KEY is unset, so exposing 0.0.0.0 directly would publish
      # every provider credential to the LAN. Use a reverse proxy with
      # network-level auth instead — see docs/deployment/docker.md.
      - "127.0.0.1:8420:8420"
    environment:
      # HA_API_KEY: gate every /api/* and WS upgrade behind a Bearer
      # token. Leave unset for the default loopback deployment — the Web
      # GUI does not yet support entering the key from the browser, so a
      # set key without a reverse proxy that adds it for you will make
      # the onboarding wizard 401. Recommended deployment with this set:
      # nginx/caddy in front, `proxy_set_header Authorization "Bearer
      # ${HA_API_KEY}"` on the upstream so browsers never see the token.
      HA_API_KEY: ${HA_API_KEY:-}
      TZ: ${TZ:-UTC}
    volumes:
      - hope-data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: hope-agent-ollama
    restart: unless-stopped
    profiles: [with-ollama]
    volumes:
      - ollama-models:/root/.ollama
    # Ollama is only reachable from the compose network — Hope Agent talks
    # to it via `http://ollama:11434/v1` (configure that URL inside the
    # browser onboarding wizard as a custom Provider). Uncomment the
    # `ports` block below to also expose Ollama on the host.
    #ports:
    #  - "127.0.0.1:11434:11434"
    #
    # NVIDIA GPU passthrough requires nvidia-container-toolkit on the host.
    # Uncomment the block below after installing it.
    #deploy:
    #  resources:
    #    reservations:
    #      devices:
    #        - driver: nvidia
    #          count: all
    #          capabilities: [gpu]

volumes:
  hope-data:
  ollama-models:
