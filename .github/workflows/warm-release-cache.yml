# 在默认分支上预热 release profile 的依赖缓存。
#
# 为什么需要：release.yml 由 `on: push: tags` 触发，而 GitHub Actions 的 cache
# 按 ref 隔离——"Workflow runs cannot restore caches created for different tag
# names"。v0.20.0 存进 refs/tags/v0.20.0 的缓存，v0.20.1 的 run 读不到，实测
# 每次发版都是 `No cache found` 的全冷构建（含 779 个外部依赖）。tag run 唯一
# 能读到的 fallback 是默认分支，但 main 上只有 rust.yml 的 clippy / test job
# 缓存，key 的 job-id 段对不上 `build`，且那是 dev profile。
#
# 本 workflow 在 main 上以 job id `build` 跑一次 release profile 构建，让 tag
# run 有一份同 key 前缀的缓存可恢复。
#
# ⚠️ 与 release.yml 的对齐是本文件唯一的价值来源，对不齐则完全失效且不报错：
#   1. job id 必须是 `build`（key 里的 -build- 段取自 GITHUB_JOB）
#   2. CARGO_PROFILE_RELEASE_CODEGEN_UNITS 必须与 release.yml 同平台取值一致
#      （落在 rust-cache 的 rust-environment-hash，linux-x64 未设覆盖 = '1'）
#   3. rust-cache 的 workspaces 参数与 toolchain action 保持一致
#   4. RUSTFLAGS 必须与 release.yml 同平台一致。它不进 env hash（release.yml
#      在 rust-cache 步骤之后才写 $GITHUB_ENV），但 cargo 把 RUSTFLAGS 变化
#      视为 dirty fingerprint（cargo#8716）——key 对上、缓存恢复了，编译时仍
#      会因 flag 不符而重编全部依赖，缓存等于白存且不报错。故必须在 rust-cache
#      之后、cargo build 之前设成同一个值。
#
# 当前仅覆盖 linux-x64：先量实际节省再决定是否铺开到另外三个平台。
name: Warm release cache

on:
  push:
    branches: [main]
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/*/Cargo.toml"
      - "src-tauri/Cargo.toml"
      - "rust-toolchain.toml"
  workflow_dispatch:

concurrency:
  group: warm-release-cache
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # job id 必须保持 `build` —— 见文件头对齐约束 1。
  build:
    name: warm (linux-x64)
    runs-on: ubuntu-24.04
    env:
      # release.yml 的 linux-x64 lane 无 codegen_units 覆盖，取默认 '1'。
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # 与 release.yml 同一份清单：-sys crate 缺头文件会编译失败，导致预热覆盖
      # 不到那部分依赖。
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            libegl-dev \
            libwayland-dev \
            patchelf \
            mold
          # 与 release.yml 同一行：写在 rust-cache 之后故不影响 key，但必须设，
          # 否则产物 fingerprint 与 release 编译环境不符、恢复后照样重编。
          echo 'RUSTFLAGS=-C link-arg=-fuse-ld=mold' >> "$GITHUB_ENV"

      # 只构建 ha-core + ha-server：覆盖绝大多数外部依赖，且不需要前端产物
      # （src-tauri 的 build.rs 要 frontendDist，为它跑一次 pnpm build 不值）。
      # rust-cache 的 cache-workspace-crates 默认 false，故缓存里只有依赖产物，
      # 自有 crate 本就每次重编。
      - name: Build dependencies (release profile)
        run: cargo build --release --locked -p ha-core -p ha-server
