name: Live Model Campaign

on:
  schedule:
    - cron: "23 2 * * *"
    - cron: "41 3 * * 1"
  workflow_dispatch:
    inputs:
      target_ref:
        description: Exact commit SHA, branch, or tag to evaluate
        required: true
        type: string
        default: main
      tier:
        description: Real-model campaign tier
        required: true
        type: choice
        options: [nightly, weekly, release, monthly]
        default: nightly
      waiver_reason:
        description: Optional one-shot release waiver reason
        required: false
        type: string
      waiver_suites:
        description: Comma-separated failed suite IDs covered by the waiver
        required: false
        type: string
      waiver_tag:
        description: Exact release tag covered by the waiver
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: live-model-campaign-${{ github.event_name == 'schedule' && github.event.schedule || inputs.target_ref }}-${{ github.event_name == 'schedule' && github.event.schedule || inputs.tier }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare immutable model campaign
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      sha: ${{ steps.meta.outputs.sha }}
      tier: ${{ steps.meta.outputs.tier }}
      retention: ${{ steps.meta.outputs.retention }}
      max_parallel: ${{ steps.meta.outputs.max_parallel }}
      signing_ready: ${{ steps.meta.outputs.signing_ready }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'schedule' && 'main' || inputs.target_ref }}
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Resolve exact SHA and tier
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          sha=$(git rev-parse HEAD)
          tier="${{ inputs.tier }}"
          if [ "${{ github.event_name }}" = schedule ]; then
            tier=nightly
            if [ "${{ github.event.schedule }}" = "41 3 * * 1" ]; then tier=weekly; fi
          fi
          retention=$(jq -r '.artifactRetentionDays' "evals/live/policy/$tier.json")
          campaign_concurrency=$(jq -r '.campaignBudget.maxConcurrency' "evals/live/policy/$tier.json")
          trial_concurrency=$(jq -r '.budget.maxConcurrency' "evals/live/policy/$tier.json")
          max_parallel=$((campaign_concurrency / trial_concurrency))
          if [ "$max_parallel" -lt 1 ]; then max_parallel=1; fi
          signing_ready=false
          if [ -f evals/live/trust/evidence-keys.json ]; then signing_ready=true; fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "tier=$tier" >> "$GITHUB_OUTPUT"
          echo "retention=$retention" >> "$GITHUB_OUTPUT"
          echo "max_parallel=$max_parallel" >> "$GITHUB_OUTPUT"
          echo "signing_ready=$signing_ready" >> "$GITHUB_OUTPUT"

      - name: Build and validate model campaign control plane
        run: |
          cargo build -p ha-eval --locked
          # Linux-only process-tree regression: prove that restart/shutdown
          # reaps descendants even after they create another process group.
          cargo test -p ha-eval --locked model_supervisor::tests
          target/debug/hope-agent-eval model validate

      - name: Create immutable plan and shard matrix
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/model-plan"
          matrix=$(target/debug/hope-agent-eval model plan \
            --tier "${{ steps.meta.outputs.tier }}" \
            --ref "${{ steps.meta.outputs.sha }}" \
            --output "$RUNNER_TEMP/model-plan/plan.json" \
            --format github)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: model-plan-${{ steps.meta.outputs.sha }}
          path: ${{ runner.temp }}/model-plan/plan.json
          retention-days: ${{ fromJSON(steps.meta.outputs.retention) }}

  run:
    name: ${{ matrix.suite }} (${{ matrix.shard }})
    needs: prepare
    # This fleet is administered separately: disposable Linux workers,
    # provider-only egress, no personal accounts, and no retained user data.
    runs-on: [self-hosted, linux, x64, model-eval]
    environment: model-eval
    timeout-minutes: 150
    strategy:
      fail-fast: false
      # Each trial may use up to policy.budget.maxConcurrency model/tool
      # workers. Cap concurrent shard jobs so their declared worst-case sum
      # never exceeds campaignBudget.maxConcurrency.
      max-parallel: ${{ fromJSON(needs.prepare.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          # The evaluated Agent has real file/exec tools. Never leave the
          # workflow token in .git/config where a tool result could return it to
          # the allowed model Provider.
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - uses: actions/download-artifact@v4
        with:
          name: model-plan-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/model-plan

      - name: Build Hope server and model runner
        run: cargo build -p ha-server -p ha-eval --locked

      - name: Provision isolated evaluation profile
        shell: bash
        env:
          MODEL_EVAL_CONFIG_B64: ${{ secrets.MODEL_EVAL_CONFIG_B64 }}
        run: |
          set -euo pipefail
          test -n "$MODEL_EVAL_CONFIG_B64"
          umask 077
          eval_data="$RUNNER_TEMP/hope-model-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.suite }}-${{ matrix.shardIndex }}"
          if [ -e "$eval_data" ] || [ -L "$eval_data" ]; then
            echo "Refusing to reuse pre-existing evaluation data path: $eval_data" >&2
            exit 1
          fi
          install -d -m 700 \
            "$eval_data" \
            "$eval_data/home/.cache" \
            "$eval_data/home/.config" \
            "$eval_data/home/.local/state" \
            "$eval_data/tmp" \
            "$eval_data/runtime"
          # Publish the cleanup target before writing any sensitive material so
          # the always() cleanup step still sees it if decoding/validation fails.
          echo "HA_DATA_DIR=$eval_data" >> "$GITHUB_ENV"
          printf '%s' "$MODEL_EVAL_CONFIG_B64" | base64 --decode > "$eval_data/config.json"
          chmod 700 "$eval_data"
          chmod 600 "$eval_data/config.json"
          install -m 700 target/debug/hope-agent-eval "$eval_data/runtime/hope-agent-eval"
          install -m 700 target/debug/hope-agent-server "$eval_data/runtime/hope-agent-server"
          jq -e '[.providers[] | select(.enabled == true)] | length == 1 and .[0].id == "eval-anchor"' "$eval_data/config.json" >/dev/null
          jq -e '.activeModel.providerId == "eval-anchor" and .activeModel.modelId == "configured-anchor-v1"' "$eval_data/config.json" >/dev/null
          jq -e 'all(.providers[]; ((.apiKey // "") == "") and (((.authProfiles // []) | length) == 0))' "$eval_data/config.json" >/dev/null
          jq -e '((.server.apiKey // "") == "") and ((.server.knowledgeAgentReadToken // "") == "")' "$eval_data/config.json" >/dev/null
          echo "HA_MODEL_EVAL_RUNTIME_CONFIG_DIGEST=$(sha256sum "$eval_data/config.json" | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "HA_MODEL_EVAL_HOME=$eval_data/home" >> "$GITHUB_ENV"
          echo "HA_MODEL_EVAL_TMP=$eval_data/tmp" >> "$GITHUB_ENV"

      - name: Start isolated Hope server supervisor
        shell: bash
        env:
          HA_MODEL_EVAL_MODE: "1"
          HA_SERVER_AUTO_APPROVE_TOOLS: "1"
          HA_MODEL_EVAL_SERVER_TOKEN: ${{ secrets.MODEL_EVAL_SERVER_TOKEN }}
          HA_MODEL_EVAL_SUPERVISOR_TOKEN: ${{ secrets.MODEL_EVAL_SUPERVISOR_TOKEN }}
          HA_MODEL_EVAL_PROVIDER_SECRETS_B64: ${{ secrets.MODEL_EVAL_PROVIDER_SECRETS_B64 }}
        run: |
          set -euo pipefail
          test -n "$HA_MODEL_EVAL_SERVER_TOKEN"
          test -n "$HA_MODEL_EVAL_SUPERVISOR_TOKEN"
          test "$HA_MODEL_EVAL_SERVER_TOKEN" != "$HA_MODEL_EVAL_SUPERVISOR_TOKEN"
          test -n "$HA_MODEL_EVAL_PROVIDER_SECRETS_B64"
          command -v bwrap >/dev/null
          port=$((18420 + ${{ matrix.shardIndex }}))
          supervisor_port=$((19420 + ${{ matrix.shardIndex }}))
          server_url="http://127.0.0.1:$port"
          supervisor_url="http://127.0.0.1:$supervisor_port"

          # Build the anonymous-stdin envelope before removing secrets from the
          # environment inherited by Bubblewrap and the long-lived supervisor.
          credential_envelope=$(jq -nc '{
            providerSecretsB64: env.HA_MODEL_EVAL_PROVIDER_SECRETS_B64,
            serverToken: env.HA_MODEL_EVAL_SERVER_TOKEN,
            supervisorToken: env.HA_MODEL_EVAL_SUPERVISOR_TOKEN
          }')
          unset HA_MODEL_EVAL_PROVIDER_SECRETS_B64
          unset HA_MODEL_EVAL_SERVER_TOKEN
          unset HA_MODEL_EVAL_SUPERVISOR_TOKEN

          # Construct an empty mount namespace: only system runtime files and
          # this shard's synthetic data tree are visible. The real checkout,
          # runner installation, host HOME and sibling jobs never enter it.
          sandbox_args=(
            --die-with-parent
            --new-session
            --unshare-all
            --share-net
            --cap-drop ALL
            --ro-bind /usr /usr
            --ro-bind-try /bin /bin
            --ro-bind-try /lib /lib
            --ro-bind-try /lib64 /lib64
            --dir /etc
            --ro-bind-try /etc/alternatives /etc/alternatives
            --ro-bind-try /etc/ca-certificates /etc/ca-certificates
            --ro-bind-try /etc/ssl /etc/ssl
            --ro-bind-try /etc/hosts /etc/hosts
            --ro-bind-try /etc/resolv.conf /etc/resolv.conf
            --ro-bind-try /etc/nsswitch.conf /etc/nsswitch.conf
            --ro-bind-try /etc/passwd /etc/passwd
            --ro-bind-try /etc/group /etc/group
            --ro-bind-try /etc/ld.so.cache /etc/ld.so.cache
            --ro-bind-try /etc/localtime /etc/localtime
            --proc /proc
            --dev /dev
            --tmpfs /tmp
            --tmpfs /run
          )
          sandbox_path=""
          IFS='/' read -r -a eval_parts <<< "${HA_DATA_DIR#/}"
          for part in "${eval_parts[@]}"; do
            sandbox_path="$sandbox_path/$part"
            sandbox_args+=(--dir "$sandbox_path")
          done
          sandbox_args+=(
            --bind "$HA_DATA_DIR" "$HA_DATA_DIR"
            --clearenv
            --setenv PATH /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            --setenv HOME "$HA_MODEL_EVAL_HOME"
            --setenv USERPROFILE "$HA_MODEL_EVAL_HOME"
            --setenv XDG_CACHE_HOME "$HA_MODEL_EVAL_HOME/.cache"
            --setenv XDG_CONFIG_HOME "$HA_MODEL_EVAL_HOME/.config"
            --setenv XDG_STATE_HOME "$HA_MODEL_EVAL_HOME/.local/state"
            --setenv TMPDIR "$HA_MODEL_EVAL_TMP"
            --setenv TMP "$HA_MODEL_EVAL_TMP"
            --setenv TEMP "$HA_MODEL_EVAL_TMP"
            --setenv HA_DATA_DIR "$HA_DATA_DIR"
            --setenv HA_MODEL_EVAL_MODE 1
            --setenv HA_MODEL_EVAL_ISOLATED_PID_NAMESPACE 1
            --setenv HA_SERVER_AUTO_APPROVE_TOOLS 1
            --chdir "$HA_DATA_DIR"
          )
          printf '%s\n' "$credential_envelope" | bwrap "${sandbox_args[@]}" \
            "$HA_DATA_DIR/runtime/hope-agent-eval" --root "$HA_DATA_DIR" \
            model _supervise-server \
            --server-bin "$HA_DATA_DIR/runtime/hope-agent-server" \
            --bind "127.0.0.1:$port" \
            --control-bind "127.0.0.1:$supervisor_port" \
            --credentials-stdin \
            > "$RUNNER_TEMP/hope-model-server-${{ matrix.shardIndex }}.log" 2>&1 &
          supervisor_pid=$!
          unset credential_envelope
          echo "HA_MODEL_EVAL_SUPERVISOR_PID=$supervisor_pid" >> "$GITHUB_ENV"
          echo "HA_MODEL_EVAL_SERVER_URL=$server_url" >> "$GITHUB_ENV"
          echo "HA_MODEL_EVAL_SUPERVISOR_URL=$supervisor_url" >> "$GITHUB_ENV"
          for attempt in $(seq 1 60); do
            if curl --fail --silent "$server_url/api/health" >/dev/null; then exit 0; fi
            sleep 1
          done
          echo "Hope evaluation server did not become healthy" >&2
          exit 1

      - name: Run real-model trials
        shell: bash
        env:
          HA_MODEL_EVAL_CONFIRM_COSTS: "1"
          HA_MODEL_EVAL_NETWORK_POLICY: ${{ matrix.networkPolicy }}
          # The runner image/firewall is the enforcement boundary. This
          # attestation is checked by the binary and is not a substitute for it.
          HA_MODEL_EVAL_NETWORK_ENFORCED: "1"
          HA_MODEL_EVAL_SERVER_TOKEN: ${{ secrets.MODEL_EVAL_SERVER_TOKEN }}
          HA_MODEL_EVAL_SUPERVISOR_TOKEN: ${{ secrets.MODEL_EVAL_SUPERVISOR_TOKEN }}
        run: |
          set -euo pipefail
          export HOME="$HA_MODEL_EVAL_HOME"
          export USERPROFILE="$HA_MODEL_EVAL_HOME"
          export XDG_CACHE_HOME="$HA_MODEL_EVAL_HOME/.cache"
          export XDG_CONFIG_HOME="$HA_MODEL_EVAL_HOME/.config"
          export XDG_STATE_HOME="$HA_MODEL_EVAL_HOME/.local/state"
          export TMPDIR="$HA_MODEL_EVAL_TMP"
          export TMP="$HA_MODEL_EVAL_TMP"
          export TEMP="$HA_MODEL_EVAL_TMP"
          export GIT_CONFIG_GLOBAL=/dev/null
          export GIT_CONFIG_NOSYSTEM=1
          mkdir -p "$RUNNER_TEMP/model-result"
          target/debug/hope-agent-eval model run \
            --plan "$RUNNER_TEMP/model-plan/plan.json" \
            --suite "${{ matrix.suite }}" \
            --shard "${{ matrix.shard }}" \
            --output "$RUNNER_TEMP/model-result/result.json" \
            --confirm-model-costs

      - name: Stop server and remove isolated state
        if: always()
        shell: bash
        env:
          HA_MODEL_EVAL_SUPERVISOR_TOKEN: ${{ secrets.MODEL_EVAL_SUPERVISOR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${HA_MODEL_EVAL_SUPERVISOR_URL:-}" ] && [ -n "${HA_MODEL_EVAL_SUPERVISOR_TOKEN:-}" ]; then
            curl --fail --silent --request POST \
              --header "Authorization: Bearer $HA_MODEL_EVAL_SUPERVISOR_TOKEN" \
              "$HA_MODEL_EVAL_SUPERVISOR_URL/shutdown" >/dev/null 2>&1 || true
          fi
          if [ -n "${HA_MODEL_EVAL_SUPERVISOR_PID:-}" ]; then
            kill "$HA_MODEL_EVAL_SUPERVISOR_PID" 2>/dev/null || true
            wait "$HA_MODEL_EVAL_SUPERVISOR_PID" 2>/dev/null || true
          fi
          if [ -n "${HA_DATA_DIR:-}" ]; then
            expected_data_dir="$RUNNER_TEMP/hope-model-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.suite }}-${{ matrix.shardIndex }}"
            if [ "$HA_DATA_DIR" != "$expected_data_dir" ] || [ -L "$HA_DATA_DIR" ]; then
              echo "Refusing to remove unexpected evaluation data path: $HA_DATA_DIR" >&2
              exit 1
            fi
            if [ -d "$HA_DATA_DIR" ]; then
              # Best-effort overwrite regular files, then remove the exact,
              # validated per-run tree including directories, links and sockets.
              find "$HA_DATA_DIR" -xdev -type f -exec shred -u {} + 2>/dev/null || true
              rm -rf -- "$HA_DATA_DIR"
            fi
            if [ -e "$HA_DATA_DIR" ] || [ -L "$HA_DATA_DIR" ]; then
              echo "Evaluation data cleanup did not complete: $HA_DATA_DIR" >&2
              exit 1
            fi
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: model-shard-${{ matrix.suite }}-${{ matrix.shardIndex }}
          path: ${{ runner.temp }}/model-result/
          if-no-files-found: warn
          retention-days: ${{ fromJSON(needs.prepare.outputs.retention) }}

  waiver:
    name: approve one-shot model campaign waiver
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.waiver_reason != '' }}
    needs: prepare
    runs-on: ubuntu-latest
    environment: release-model-eval-waiver
    steps:
      - name: Validate and record approved waiver
        shell: bash
        env:
          WAIVER_REASON: ${{ inputs.waiver_reason }}
          WAIVER_SUITES: ${{ inputs.waiver_suites }}
          WAIVER_TAG: ${{ inputs.waiver_tag }}
        run: |
          set -euo pipefail
          test "${{ needs.prepare.outputs.tier }}" = release
          test -n "$WAIVER_TAG"
          test -n "$WAIVER_SUITES"
          test "${#WAIVER_REASON}" -ge 12
          mkdir -p "$RUNNER_TEMP/model-waiver"
          suites=$(printf '%s' "$WAIVER_SUITES" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')
          jq -n \
            --arg commitSha "${{ needs.prepare.outputs.sha }}" \
            --arg tag "$WAIVER_TAG" \
            --arg reason "$WAIVER_REASON" \
            --arg approvedBy "${{ github.actor }}" \
            --arg approvedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg workflowRunId "${{ github.run_id }}" \
            --argjson suites "$suites" \
            '{schemaVersion:"model-campaign-waiver.v1",commitSha:$commitSha,tag:$tag,reason:$reason,suites:$suites,cases:[],modelRoles:[],approvedBy:$approvedBy,approvedAt:$approvedAt,workflowRunId:$workflowRunId}' \
            > "$RUNNER_TEMP/model-waiver/waiver.json"

      - uses: actions/upload-artifact@v4
        with:
          name: model-waiver-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/model-waiver/waiver.json
          retention-days: 90

  aggregate:
    name: aggregate and verify model evidence
    needs: [prepare, run, waiver]
    if: ${{ always() && needs.prepare.result == 'success' && (needs.run.result == 'success' || needs.run.result == 'failure') && (needs.waiver.result == 'success' || needs.waiver.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - uses: actions/download-artifact@v4
        with:
          name: model-plan-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/model-plan

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: model-shard-*
          path: ${{ runner.temp }}/model-shards

      - name: Download approved waiver when present
        if: ${{ needs.waiver.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: model-waiver-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/model-waiver

      - name: Build model campaign verifier
        run: cargo build -p ha-eval --locked

      - name: Aggregate evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/model-evidence" "$RUNNER_TEMP/model-shards"
          waiver_args=()
          if [ -f "$RUNNER_TEMP/model-waiver/waiver.json" ]; then
            waiver_args=(--waiver "$RUNNER_TEMP/model-waiver/waiver.json")
          fi
          target/debug/hope-agent-eval model aggregate \
            --plan "$RUNNER_TEMP/model-plan/plan.json" \
            --inputs "$RUNNER_TEMP/model-shards" \
            --output "$RUNNER_TEMP/model-evidence/eval-model-campaign.v1.json" \
            --summary "$RUNNER_TEMP/model-evidence/model-summary.md" \
            "${waiver_args[@]}"

      - name: Verify evidence against exact SHA and policy
        shell: bash
        env:
          WAIVER_TAG: ${{ inputs.waiver_tag }}
        run: |
          set -euo pipefail
          tag_args=()
          if [ -n "$WAIVER_TAG" ]; then tag_args=(--tag "$WAIVER_TAG"); fi
          target/debug/hope-agent-eval model verify-evidence \
            --evidence "$RUNNER_TEMP/model-evidence/eval-model-campaign.v1.json" \
            --ref "${{ needs.prepare.outputs.sha }}" \
            --tier "${{ needs.prepare.outputs.tier }}" \
            "${tag_args[@]}"

      - name: Add model result to workflow summary
        if: always()
        shell: bash
        run: |
          if [ -f "$RUNNER_TEMP/model-evidence/model-summary.md" ]; then
            cat "$RUNNER_TEMP/model-evidence/model-summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ needs.prepare.outputs.tier }}-model-evidence-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/model-evidence/
          retention-days: ${{ fromJSON(needs.prepare.outputs.retention) }}

  sign:
    name: sign protected model evidence bundle
    needs: [prepare, aggregate]
    if: ${{ needs.aggregate.result == 'success' && needs.prepare.outputs.signing_ready == 'true' }}
    runs-on: ubuntu-latest
    # The evidence signing key is independent from Provider and updater keys.
    # Environment approval is the operational trust boundary for bundle export.
    environment: model-eval-evidence-signing
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          persist-credentials: false

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.tier }}-model-evidence-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/model-evidence

      - name: Build protected bundle signer
        run: cargo build -p ha-eval --locked

      - name: Sign exact-SHA evidence bundle
        shell: bash
        env:
          MODEL_EVAL_EVIDENCE_SIGNING_KEY_PKCS8_B64: ${{ secrets.MODEL_EVAL_EVIDENCE_SIGNING_KEY_PKCS8_B64 }}
          MODEL_EVAL_EVIDENCE_KEY_ID: ${{ vars.MODEL_EVAL_EVIDENCE_KEY_ID }}
        run: |
          set -euo pipefail
          test -n "$MODEL_EVAL_EVIDENCE_SIGNING_KEY_PKCS8_B64"
          test -n "$MODEL_EVAL_EVIDENCE_KEY_ID"
          mkdir -p "$RUNNER_TEMP/model-bundle"
          target/debug/hope-agent-eval model bundle-export \
            --evidence "$RUNNER_TEMP/model-evidence/eval-model-campaign.v1.json" \
            --output "$RUNNER_TEMP/model-bundle/eval-evidence-bundle.v1.zip" \
            --repository "${{ github.repository }}" \
            --workflow "${{ github.workflow_ref }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --environment model-eval \
            --key-id "$MODEL_EVAL_EVIDENCE_KEY_ID"
          test -f evals/live/trust/evidence-keys.json
          target/debug/hope-agent-eval model bundle-verify \
            --bundle "$RUNNER_TEMP/model-bundle/eval-evidence-bundle.v1.zip" \
            --trust-registry evals/live/trust/evidence-keys.json

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.tier }}-signed-model-evidence-${{ needs.prepare.outputs.sha }}
          path: ${{ runner.temp }}/model-bundle/eval-evidence-bundle.v1.zip
          retention-days: ${{ fromJSON(needs.prepare.outputs.retention) }}
